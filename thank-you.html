<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Thank you for contacting Esau Victor">
  <title>Thank You | Esau Victor</title>
  <link rel="icon" href="https://avatars.githubusercontent.com/u/94287719?v=4" type="image/png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --blue:      #1d4ed8;
      --blue-dark: #1338a8;
      --blue-mid:  #3b82f6;
      --violet:    #7c3aed;
      --green:     #10b981;
      --ink:       #0b1220;
      --ink2:      #1e293b;
      --muted:     #64748b;
      --border:    rgba(255,255,255,.1);
      --white:     #ffffff;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--ink);
      color: var(--white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ---- Grid background ---- */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(29,78,216,.1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(29,78,216,.1) 1px, transparent 1px);
      background-size: 60px 60px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 20%, transparent 100%);
      z-index: 0;
    }

    /* ---- Glow orb ---- */
    .glow-orb {
      position: fixed;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(29,78,216,.25) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 0;
      animation: orb-pulse 4s ease-in-out infinite;
    }
    @keyframes orb-pulse {
      0%,100% { transform: translate(-50%,-50%) scale(1); opacity: .7; }
      50%      { transform: translate(-50%,-50%) scale(1.15); opacity: 1; }
    }

    /* ---- Floating particles ---- */
    .particles {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
    }
    .particle {
      position: absolute;
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--blue-mid);
      opacity: 0;
      animation: float-up var(--dur) ease-in var(--delay) infinite;
    }
    @keyframes float-up {
      0%   { opacity: 0; transform: translateY(0) scale(0); }
      10%  { opacity: .8; transform: translateY(-20px) scale(1); }
      90%  { opacity: .3; }
      100% { opacity: 0; transform: translateY(-200px) scale(0.3); }
    }

    /* ---- Card ---- */
    .card {
      position: relative; z-index: 1;
      background: rgba(255,255,255,.04);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 28px;
      padding: 56px 52px;
      max-width: 520px;
      width: 90%;
      text-align: center;
      box-shadow: 0 32px 80px rgba(0,0,0,.4), 0 0 0 1px rgba(29,78,216,.2);
      animation: card-in 0.8s cubic-bezier(0.16,1,0.3,1) forwards;
      opacity: 0;
      transform: translateY(40px) scale(0.97);
    }
    @keyframes card-in {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ---- Icon ring animation ---- */
    .icon-wrap {
      position: relative;
      width: 100px; height: 100px;
      margin: 0 auto 36px;
    }

    /* SVG checkmark circle */
    .check-svg {
      width: 100px; height: 100px;
    }
    .check-circle {
      fill: none;
      stroke: rgba(29,78,216,.2);
      stroke-width: 3;
    }
    .check-progress {
      fill: none;
      stroke: url(#grad);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-dasharray: 283;
      stroke-dashoffset: 283;
      transform-origin: center;
      transform: rotate(-90deg);
      animation: draw-circle 1s cubic-bezier(0.16,1,0.3,1) 0.3s forwards;
    }
    @keyframes draw-circle {
      to { stroke-dashoffset: 0; }
    }

    /* Icon in center */
    .icon-center {
      position: absolute;
      inset: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .icon-center i {
      font-size: 2.2rem;
      color: var(--blue-mid);
      opacity: 0;
      transform: scale(0.5) rotate(-20deg);
      animation: icon-pop 0.5s cubic-bezier(0.34,1.56,0.64,1) 1s forwards;
    }
    @keyframes icon-pop {
      to { opacity: 1; transform: scale(1) rotate(0deg); }
    }

    /* Ripple rings */
    .ripple {
      position: absolute; inset: -8px;
      border-radius: 50%;
      border: 2px solid var(--blue-mid);
      opacity: 0;
      animation: ripple-out 2s ease-out 1.2s infinite;
    }
    .ripple:nth-child(2) { animation-delay: 1.7s; }
    .ripple:nth-child(3) { animation-delay: 2.2s; }
    @keyframes ripple-out {
      0%   { transform: scale(1); opacity: .5; }
      100% { transform: scale(1.8); opacity: 0; }
    }

    /* ---- Text ---- */
    .label {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: .72rem;
      font-weight: 700;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--blue-mid);
      background: rgba(29,78,216,.15);
      border: 1px solid rgba(29,78,216,.3);
      padding: 5px 14px;
      border-radius: 100px;
      margin-bottom: 20px;
      opacity: 0;
      animation: fade-up .6s ease 1.1s forwards;
    }
    .label::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--blue-mid);
      animation: pulse-dot 2s infinite;
    }
    @keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.3} }

    h1 {
      font-size: clamp(1.7rem, 4vw, 2.2rem);
      font-weight: 800;
      color: var(--white);
      letter-spacing: -.03em;
      line-height: 1.1;
      margin-bottom: 14px;
      opacity: 0;
      animation: fade-up .6s ease 1.25s forwards;
    }
    h1 span { color: var(--blue-mid); }

    .subtitle {
      font-size: .95rem;
      font-weight: 400;
      color: #94a3b8;
      line-height: 1.7;
      margin-bottom: 36px;
      opacity: 0;
      animation: fade-up .6s ease 1.4s forwards;
    }
    .subtitle strong { color: rgba(255,255,255,.85); font-weight: 600; }

    /* ---- Steps ---- */
    .steps {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 36px;
      text-align: left;
      opacity: 0;
      animation: fade-up .6s ease 1.55s forwards;
    }
    .step {
      display: flex;
      align-items: center;
      gap: 14px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(255,255,255,.07);
      border-radius: 12px;
      padding: 12px 16px;
      font-size: .85rem;
      font-weight: 500;
      color: #94a3b8;
    }
    .step-ico {
      width: 32px; height: 32px; flex-shrink: 0;
      border-radius: 8px;
      background: rgba(29,78,216,.2);
      display: flex; align-items: center; justify-content: center;
      color: var(--blue-mid);
      font-size: .85rem;
    }
    .step-ico.green { background: rgba(16,185,129,.15); color: var(--green); }

    /* ---- CTA button ---- */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      padding: 13px 28px;
      background: var(--blue);
      color: var(--white);
      border-radius: 12px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: .9rem;
      letter-spacing: .02em;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: all .22s cubic-bezier(0.16,1,0.3,1);
      box-shadow: 0 8px 24px rgba(29,78,216,.35);
      opacity: 0;
      animation: fade-up .6s ease 1.7s forwards;
    }
    .btn:hover {
      background: var(--blue-dark);
      transform: translateY(-3px);
      box-shadow: 0 14px 36px rgba(29,78,216,.45);
    }

    /* ---- Timer bar ---- */
    .timer-bar-wrap {
      margin-top: 28px;
      opacity: 0;
      animation: fade-up .6s ease 1.85s forwards;
    }
    .timer-label {
      font-size: .72rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: .06em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .timer-track {
      height: 3px;
      background: rgba(255,255,255,.07);
      border-radius: 100px;
      overflow: hidden;
    }
    .timer-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--blue), var(--violet));
      border-radius: 100px;
      width: 100%;
      animation: shrink 8s linear 2.2s forwards;
    }
    @keyframes shrink { to { width: 0%; } }

    /* ---- Footer ---- */
    footer {
      position: relative; z-index: 1;
      margin-top: 32px;
      font-size: .78rem;
      font-weight: 500;
      color: #334155;
      letter-spacing: .03em;
      opacity: 0;
      animation: fade-up .6s ease 2s forwards;
    }
    footer span { color: var(--blue-mid); }

    /* shared fade-up */
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .card { padding: 40px 28px; }
      h1 { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

  <div class="glow-orb"></div>

  <!-- Particles -->
  <div class="particles" id="particles"></div>

  <!-- Card -->
  <div class="card">

    <!-- Animated icon -->
    <div class="icon-wrap">
      <div class="ripple"></div>
      <div class="ripple"></div>
      <div class="ripple"></div>
      <svg class="check-svg" viewBox="0 0 100 100">
        <defs>
          <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#1d4ed8"/>
            <stop offset="100%" stop-color="#7c3aed"/>
          </linearGradient>
        </defs>
        <circle class="check-circle" cx="50" cy="50" r="45"/>
        <circle class="check-progress" cx="50" cy="50" r="45"/>
      </svg>
      <div class="icon-center">
        <i class="fas fa-paper-plane"></i>
      </div>
    </div>

    <div class="label">Message Delivered</div>

    <h1>Got it, <span>loud & clear!</span></h1>

    <p class="subtitle">
      Thanks for reaching out to <strong>Esau Victor</strong>.<br>
      Your message is in — here's what happens next.
    </p>

    <div class="steps">
      <div class="step">
        <div class="step-ico green"><i class="fas fa-check"></i></div>
        Message received & logged
      </div>
      <div class="step">
        <div class="step-ico"><i class="fas fa-search"></i></div>
        Reviewing your inquiry
      </div>
      <div class="step">
        <div class="step-ico"><i class="fas fa-reply"></i></div>
        Reply within 24–48 hours
      </div>
    </div>

    <a href="https://esauvictor.github.io" class="btn">
      <i class="fas fa-arrow-left"></i> Back to Portfolio
    </a>

    <div class="timer-bar-wrap">
      <div class="timer-label">Auto-redirecting in 8s</div>
      <div class="timer-track">
        <div class="timer-fill" id="timerFill"></div>
      </div>
    </div>

  </div>

  <footer>&copy; <span id="yr"></span> <span>Esau Victor</span>. All rights reserved.</footer>

  <script>
    // Year
    document.getElementById('yr').textContent = new Date().getFullYear();

    // Auto redirect after 8s (matches timer bar)
    setTimeout(() => {
      window.location.href = 'https://esauvictor.github.io';
    }, 10200); // slight buffer after animation starts at 2.2s + 8s

    // Spawn particles
    const container = document.getElementById('particles');
    for (let i = 0; i < 28; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.cssText = `
        left: ${Math.random() * 100}%;
        top: ${40 + Math.random() * 50}%;
        --dur: ${4 + Math.random() * 6}s;
        --delay: ${Math.random() * 6}s;
        width: ${2 + Math.random() * 4}px;
        height: ${2 + Math.random() * 4}px;
        opacity: 0;
      `;
      container.appendChild(p);
    }
  </script>
</body>
</html>
