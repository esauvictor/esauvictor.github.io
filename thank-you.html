<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="description" content="Thank you for contacting Esau Victor">
  <title>Thank You | Esau Victor</title>
  <link rel="icon" href="https://avatars.githubusercontent.com/u/94287719?v=4" type="image/png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>
    :root {
      --blue:     #1d4ed8;
      --blue-dark:#1338a8;
      --blue-mid: #3b82f6;
      --violet:   #7c3aed;
      --green:    #10b981;
      --ink:      #0b1220;
      --muted:    #64748b;
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    html, body {
      width:100%; height:100%;
      overflow:hidden;
    }

    body {
      font-family:'Montserrat',sans-serif;
      background:var(--ink);
      color:#fff;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      -webkit-font-smoothing:antialiased;
    }

    /* Grid bg */
    body::before {
      content:'';
      position:fixed; inset:0;
      background-image:
        linear-gradient(rgba(29,78,216,.09) 1px, transparent 1px),
        linear-gradient(90deg, rgba(29,78,216,.09) 1px, transparent 1px);
      background-size:48px 48px;
      mask-image:radial-gradient(ellipse 85% 85% at 50% 50%, black 10%, transparent 100%);
      -webkit-mask-image:radial-gradient(ellipse 85% 85% at 50% 50%, black 10%, transparent 100%);
      pointer-events:none; z-index:0;
    }

    /* Glow */
    .glow-orb {
      position:fixed;
      width:clamp(200px,60vmin,480px); height:clamp(200px,60vmin,480px);
      border-radius:50%;
      background:radial-gradient(circle, rgba(29,78,216,.2) 0%, transparent 70%);
      top:50%; left:50%;
      transform:translate(-50%,-50%);
      z-index:0; pointer-events:none;
      animation:orb-pulse 4s ease-in-out infinite;
    }
    @keyframes orb-pulse {
      0%,100%{opacity:.6;transform:translate(-50%,-50%) scale(1)}
      50%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}
    }

    /* Particles */
    .particles{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}
    .particle{
      position:absolute; border-radius:50%; background:var(--blue-mid); opacity:0;
      animation:float-up var(--dur) ease-in var(--delay) infinite;
    }
    @keyframes float-up{
      0%{opacity:0;transform:translateY(0) scale(0)}
      10%{opacity:.5;transform:translateY(-12px) scale(1)}
      90%{opacity:.1}
      100%{opacity:0;transform:translateY(-130px) scale(.3)}
    }

    /* ---- Wrapper ---- */
    .wrapper {
      position:relative; z-index:1;
      width:100%;
      /* use vmin so it scales on both orientations */
      max-width: min(440px, 92vw);
      padding: 0 12px;
      display:flex;
      flex-direction:column;
      align-items:center;
      gap: clamp(6px, 1.2vh, 12px);
    }

    /* ---- Card ---- */
    .card {
      width:100%;
      background:rgba(255,255,255,.04);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      /* padding scales with viewport height so it never overflows */
      padding: clamp(14px,2.8vh,32px) clamp(16px,3vw,32px);
      text-align:center;
      box-shadow:0 16px 48px rgba(0,0,0,.45),0 0 0 1px rgba(29,78,216,.16);
      opacity:0;
      transform:translateY(24px) scale(.97);
      animation:card-in .7s cubic-bezier(0.16,1,0.3,1) .1s forwards;
    }
    @keyframes card-in{to{opacity:1;transform:translateY(0) scale(1)}}

    /* ---- Icon ---- */
    .icon-wrap {
      position:relative;
      /* scales between 48px and 72px based on viewport height */
      width: clamp(48px,7vh,72px);
      height:clamp(48px,7vh,72px);
      margin:0 auto clamp(8px,1.4vh,16px);
    }
    .check-svg{width:100%;height:100%;display:block;}
    .check-circle{fill:none;stroke:rgba(29,78,216,.18);stroke-width:3.5}
    .check-progress{
      fill:none;stroke:url(#grad);stroke-width:3.5;stroke-linecap:round;
      stroke-dasharray:283;stroke-dashoffset:283;
      transform-origin:center;transform:rotate(-90deg);
      animation:draw-circle .9s cubic-bezier(0.16,1,0.3,1) .4s forwards;
    }
    @keyframes draw-circle{to{stroke-dashoffset:0}}
    .icon-center{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
    .icon-center i{
      font-size:clamp(.9rem,2.5vh,1.3rem);
      color:var(--blue-mid);opacity:0;
      transform:scale(.5) rotate(-20deg);
      animation:icon-pop .45s cubic-bezier(0.34,1.56,0.64,1) 1.05s forwards;
    }
    @keyframes icon-pop{to{opacity:1;transform:scale(1) rotate(0)}}
    .ripple{
      position:absolute;inset:-5px;border-radius:50%;
      border:1.5px solid var(--blue-mid);opacity:0;
      animation:ripple-out 2s ease-out 1.3s infinite;
    }
    .ripple:nth-child(2){animation-delay:1.8s}
    .ripple:nth-child(3){animation-delay:2.3s}
    @keyframes ripple-out{
      0%{transform:scale(1);opacity:.4}
      100%{transform:scale(1.75);opacity:0}
    }

    /* ---- Label ---- */
    .label{
      display:inline-flex;align-items:center;gap:5px;
      font-size:clamp(.55rem,1.1vh,.65rem);font-weight:700;
      letter-spacing:.12em;text-transform:uppercase;
      color:var(--blue-mid);background:rgba(29,78,216,.13);
      border:1px solid rgba(29,78,216,.26);
      padding:3px 10px;border-radius:100px;
      margin-bottom:clamp(5px,1vh,10px);
      opacity:0;animation:fade-up .45s ease 1.15s forwards;
    }
    .label::before{
      content:'';width:4px;height:4px;border-radius:50%;
      background:var(--blue-mid);animation:blink 2s infinite;
    }
    @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

    /* ---- Heading ---- */
    h1{
      font-size:clamp(1.05rem,3vh,1.5rem);font-weight:800;
      letter-spacing:-.03em;line-height:1.1;
      margin-bottom:clamp(4px,.8vh,8px);
      opacity:0;animation:fade-up .45s ease 1.3s forwards;
    }
    h1 span{color:var(--blue-mid)}

    /* ---- Subtitle ---- */
    .subtitle{
      font-size:clamp(.7rem,1.6vh,.82rem);font-weight:400;
      color:#94a3b8;line-height:1.55;
      margin-bottom:clamp(10px,1.8vh,18px);
      opacity:0;animation:fade-up .45s ease 1.45s forwards;
    }
    .subtitle strong{color:rgba(255,255,255,.85);font-weight:600}

    /* ---- Steps ---- */
    .steps{
      display:flex;flex-direction:column;
      gap:clamp(4px,.8vh,7px);
      margin-bottom:clamp(10px,1.8vh,18px);
      text-align:left;
      opacity:0;animation:fade-up .45s ease 1.6s forwards;
    }
    .step{
      display:flex;align-items:center;gap:9px;
      background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);
      border-radius:9px;
      padding:clamp(6px,1.1vh,9px) 12px;
      font-size:clamp(.68rem,1.5vh,.78rem);font-weight:500;color:#94a3b8;
    }
    .step-ico{
      width:22px;height:22px;flex-shrink:0;border-radius:6px;
      background:rgba(29,78,216,.18);
      display:flex;align-items:center;justify-content:center;
      color:var(--blue-mid);font-size:.65rem;
    }
    .step-ico.green{background:rgba(16,185,129,.12);color:var(--green)}

    /* ---- Button ---- */
    .btn{
      display:inline-flex;align-items:center;justify-content:center;gap:7px;
      padding:clamp(8px,1.4vh,11px) clamp(18px,3vw,24px);
      background:var(--blue);color:#fff;border-radius:10px;
      font-family:'Montserrat',sans-serif;font-weight:700;
      font-size:clamp(.72rem,1.5vh,.82rem);letter-spacing:.02em;
      border:none;cursor:pointer;text-decoration:none;
      transition:all .2s cubic-bezier(0.16,1,0.3,1);
      box-shadow:0 6px 20px rgba(29,78,216,.28);
      opacity:0;animation:fade-up .45s ease 1.75s forwards;
    }
    .btn:hover{background:var(--blue-dark);transform:translateY(-2px);box-shadow:0 10px 28px rgba(29,78,216,.38)}

    /* ---- Timer ---- */
    .timer-wrap{
      margin-top:clamp(8px,1.4vh,14px);
      opacity:0;animation:fade-up .45s ease 1.9s forwards;
    }
    .timer-label{
      font-size:clamp(.55rem,1.1vh,.62rem);font-weight:600;
      color:var(--muted);letter-spacing:.07em;text-transform:uppercase;margin-bottom:5px;
    }
    .timer-track{height:2px;background:rgba(255,255,255,.06);border-radius:100px;overflow:hidden;}
    .timer-fill{
      height:100%;background:linear-gradient(90deg,var(--blue),var(--violet));
      border-radius:100px;width:100%;
      animation:shrink 8s linear 2.1s forwards;
    }
    @keyframes shrink{to{width:0%}}

    /* ---- Footer ---- */
    footer{
      position:relative;z-index:1;
      font-size:clamp(.58rem,1vh,.68rem);font-weight:500;
      color:#1e3a5f;letter-spacing:.03em;text-align:center;
      opacity:0;animation:fade-up .45s ease 2.05s forwards;
    }
    footer span{color:var(--blue-mid)}

    @keyframes fade-up{
      from{opacity:0;transform:translateY(8px)}
      to{opacity:1;transform:translateY(0)}
    }
  </style>
</head>
<body>

  <div class="glow-orb"></div>
  <div class="particles" id="particles"></div>

  <div class="wrapper">
    <div class="card">

      <div class="icon-wrap">
        <div class="ripple"></div>
        <div class="ripple"></div>
        <div class="ripple"></div>
        <svg class="check-svg" viewBox="0 0 100 100">
          <defs>
            <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#1d4ed8"/>
              <stop offset="100%" stop-color="#7c3aed"/>
            </linearGradient>
          </defs>
          <circle class="check-circle" cx="50" cy="50" r="45"/>
          <circle class="check-progress" cx="50" cy="50" r="45"/>
        </svg>
        <div class="icon-center">
          <i class="fas fa-paper-plane"></i>
        </div>
      </div>

      <div class="label">Message Delivered</div>
      <h1>Got it, <span>loud & clear!</span></h1>

      <p class="subtitle">
        Thanks for reaching out to <strong>Esau Victor</strong>.<br>
        Your message is in — here's what happens next.
      </p>

      <div class="steps">
        <div class="step">
          <div class="step-ico green"><i class="fas fa-check"></i></div>
          Message received &amp; logged
        </div>
        <div class="step">
          <div class="step-ico"><i class="fas fa-search"></i></div>
          Reviewing your inquiry
        </div>
        <div class="step">
          <div class="step-ico"><i class="fas fa-reply"></i></div>
          Reply within the hour — usually faster.
        </div>
      </div>

      <a href="https://esauvictor.github.io" class="btn">
        <i class="fas fa-arrow-left"></i> Back to Portfolio
      </a>

      <div class="timer-wrap">
        <div class="timer-label">Auto-redirecting in 8s</div>
        <div class="timer-track"><div class="timer-fill"></div></div>
      </div>

    </div>

    <footer>&copy; <span id="yr"></span> <span>Esau Victor</span>. All rights reserved.</footer>
  </div>

  <script>
    document.getElementById('yr').textContent = new Date().getFullYear();
    setTimeout(() => { window.location.href = 'https://esauvictor.github.io'; }, 10400);

    const c = document.getElementById('particles');
    for (let i = 0; i < 18; i++) {
      const p = document.createElement('div');
      const s = 2 + Math.random() * 2;
      p.className = 'particle';
      p.style.cssText = `left:${Math.random()*100}%;top:${25+Math.random()*60}%;width:${s}px;height:${s}px;--dur:${4+Math.random()*5}s;--delay:${Math.random()*5}s;`;
      c.appendChild(p);
    }
  </script>
</body>
</html>
