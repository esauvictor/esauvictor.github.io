<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="description" content="Thank you for contacting Esau Victor">
  <title>Thank You | Esau Victor</title>
  <link rel="icon" href="https://avatars.githubusercontent.com/u/94287719?v=4" type="image/png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    :root {
      --blue:      #1d4ed8;
      --blue-dark: #1338a8;
      --blue-mid:  #3b82f6;
      --violet:    #7c3aed;
      --green:     #10b981;
      --ink:       #0b1220;
      --muted:     #64748b;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      height: 100%;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background: var(--ink);
      color: #fff;
      height: 100%;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      padding: 16px;
    }

    /* Grid bg */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(29,78,216,.1) 1px, transparent 1px),
        linear-gradient(90deg, rgba(29,78,216,.1) 1px, transparent 1px);
      background-size: 50px 50px;
      mask-image: radial-gradient(ellipse 90% 90% at 50% 50%, black 10%, transparent 100%);
      -webkit-mask-image: radial-gradient(ellipse 90% 90% at 50% 50%, black 10%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* Glow orb */
    .glow-orb {
      position: fixed;
      width: clamp(300px, 80vw, 560px);
      height: clamp(300px, 80vw, 560px);
      border-radius: 50%;
      background: radial-gradient(circle, rgba(29,78,216,.22) 0%, transparent 70%);
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 0;
      pointer-events: none;
      animation: orb-pulse 4s ease-in-out infinite;
    }
    @keyframes orb-pulse {
      0%,100% { opacity: .7; transform: translate(-50%,-50%) scale(1); }
      50%      { opacity: 1;  transform: translate(-50%,-50%) scale(1.12); }
    }

    /* Particles */
    .particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .particle {
      position: absolute;
      border-radius: 50%;
      background: var(--blue-mid);
      opacity: 0;
      animation: float-up var(--dur) ease-in var(--delay) infinite;
    }
    @keyframes float-up {
      0%   { opacity: 0; transform: translateY(0) scale(0); }
      10%  { opacity: .6; transform: translateY(-15px) scale(1); }
      90%  { opacity: .15; }
      100% { opacity: 0; transform: translateY(-160px) scale(.3); }
    }

    /* ---- Wrapper ---- */
    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    /* ---- Card ---- */
    .card {
      width: 100%;
      background: rgba(255,255,255,.04);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 22px;
      padding: clamp(24px, 5vw, 48px) clamp(18px, 5vw, 40px);
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,.45), 0 0 0 1px rgba(29,78,216,.18);
      opacity: 0;
      transform: translateY(28px) scale(.97);
      animation: card-in .8s cubic-bezier(0.16,1,0.3,1) .1s forwards;
    }
    @keyframes card-in {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* ---- Icon ring ---- */
    .icon-wrap {
      position: relative;
      width: clamp(68px, 17vw, 90px);
      height: clamp(68px, 17vw, 90px);
      margin: 0 auto clamp(16px, 3.5vw, 28px);
      flex-shrink: 0;
    }
    .check-svg { width: 100%; height: 100%; display: block; }
    .check-circle { fill: none; stroke: rgba(29,78,216,.18); stroke-width: 3; }
    .check-progress {
      fill: none;
      stroke: url(#grad);
      stroke-width: 3;
      stroke-linecap: round;
      stroke-dasharray: 283;
      stroke-dashoffset: 283;
      transform-origin: center;
      transform: rotate(-90deg);
      animation: draw-circle 1s cubic-bezier(0.16,1,0.3,1) .4s forwards;
    }
    @keyframes draw-circle { to { stroke-dashoffset: 0; } }

    .icon-center {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .icon-center i {
      font-size: clamp(1.3rem, 4vw, 1.9rem);
      color: var(--blue-mid);
      opacity: 0;
      transform: scale(.5) rotate(-20deg);
      animation: icon-pop .5s cubic-bezier(0.34,1.56,0.64,1) 1.1s forwards;
    }
    @keyframes icon-pop { to { opacity: 1; transform: scale(1) rotate(0); } }

    .ripple {
      position: absolute; inset: -6px;
      border-radius: 50%;
      border: 1.5px solid var(--blue-mid);
      opacity: 0;
      animation: ripple-out 2s ease-out 1.3s infinite;
    }
    .ripple:nth-child(2) { animation-delay: 1.8s; }
    .ripple:nth-child(3) { animation-delay: 2.3s; }
    @keyframes ripple-out {
      0%   { transform: scale(1); opacity: .4; }
      100% { transform: scale(1.8); opacity: 0; }
    }

    /* ---- Label ---- */
    .label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: clamp(.62rem, 1.8vw, .7rem);
      font-weight: 700;
      letter-spacing: .13em;
      text-transform: uppercase;
      color: var(--blue-mid);
      background: rgba(29,78,216,.14);
      border: 1px solid rgba(29,78,216,.28);
      padding: 4px 12px;
      border-radius: 100px;
      margin-bottom: clamp(8px, 2vw, 16px);
      opacity: 0;
      animation: fade-up .5s ease 1.2s forwards;
    }
    .label::before {
      content: '';
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--blue-mid);
      animation: blink 2s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

    /* ---- Heading ---- */
    h1 {
      font-size: clamp(1.3rem, 5vw, 1.9rem);
      font-weight: 800;
      letter-spacing: -.03em;
      line-height: 1.1;
      margin-bottom: clamp(6px, 1.5vw, 12px);
      opacity: 0;
      animation: fade-up .5s ease 1.35s forwards;
    }
    h1 span { color: var(--blue-mid); }

    /* ---- Subtitle ---- */
    .subtitle {
      font-size: clamp(.8rem, 2.3vw, .92rem);
      font-weight: 400;
      color: #94a3b8;
      line-height: 1.7;
      margin-bottom: clamp(16px, 3.5vw, 28px);
      opacity: 0;
      animation: fade-up .5s ease 1.5s forwards;
    }
    .subtitle strong { color: rgba(255,255,255,.85); font-weight: 600; }

    /* ---- Steps ---- */
    .steps {
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin-bottom: clamp(16px, 3.5vw, 28px);
      text-align: left;
      opacity: 0;
      animation: fade-up .5s ease 1.65s forwards;
    }
    .step {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.06);
      border-radius: 10px;
      padding: clamp(8px, 2vw, 11px) clamp(10px, 2.5vw, 14px);
      font-size: clamp(.75rem, 2vw, .83rem);
      font-weight: 500;
      color: #94a3b8;
    }
    .step-ico {
      width: 26px; height: 26px; flex-shrink: 0;
      border-radius: 6px;
      background: rgba(29,78,216,.18);
      display: flex; align-items: center; justify-content: center;
      color: var(--blue-mid);
      font-size: .75rem;
    }
    .step-ico.green { background: rgba(16,185,129,.12); color: var(--green); }

    /* ---- Button ---- */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: clamp(10px, 2.5vw, 13px) clamp(20px, 5vw, 28px);
      background: var(--blue);
      color: #fff;
      border-radius: 11px;
      font-family: 'Montserrat', sans-serif;
      font-weight: 700;
      font-size: clamp(.8rem, 2.2vw, .9rem);
      letter-spacing: .02em;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: all .22s cubic-bezier(0.16,1,0.3,1);
      box-shadow: 0 8px 24px rgba(29,78,216,.3);
      opacity: 0;
      animation: fade-up .5s ease 1.8s forwards;
    }
    .btn:hover {
      background: var(--blue-dark);
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(29,78,216,.4);
    }

    /* ---- Timer bar ---- */
    .timer-wrap {
      margin-top: clamp(14px, 3vw, 22px);
      opacity: 0;
      animation: fade-up .5s ease 1.95s forwards;
    }
    .timer-label {
      font-size: clamp(.6rem, 1.6vw, .68rem);
      font-weight: 600;
      color: var(--muted);
      letter-spacing: .07em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .timer-track {
      height: 3px;
      background: rgba(255,255,255,.06);
      border-radius: 100px;
      overflow: hidden;
    }
    .timer-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--blue), var(--violet));
      border-radius: 100px;
      width: 100%;
      animation: shrink 8s linear 2.2s forwards;
    }
    @keyframes shrink { to { width: 0%; } }

    /* ---- Footer ---- */
    footer {
      position: relative; z-index: 1;
      font-size: clamp(.68rem, 1.7vw, .76rem);
      font-weight: 500;
      color: #1e293b;
      letter-spacing: .03em;
      text-align: center;
      opacity: 0;
      animation: fade-up .5s ease 2.1s forwards;
    }
    footer span { color: var(--blue-mid); }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="glow-orb"></div>
  <div class="particles" id="particles"></div>

  <div class="wrapper">

    <div class="card">

      <!-- Animated icon -->
      <div class="icon-wrap">
        <div class="ripple"></div>
        <div class="ripple"></div>
        <div class="ripple"></div>
        <svg class="check-svg" viewBox="0 0 100 100">
          <defs>
            <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#1d4ed8"/>
              <stop offset="100%" stop-color="#7c3aed"/>
            </linearGradient>
          </defs>
          <circle class="check-circle" cx="50" cy="50" r="45"/>
          <circle class="check-progress" cx="50" cy="50" r="45"/>
        </svg>
        <div class="icon-center">
          <i class="fas fa-paper-plane"></i>
        </div>
      </div>

      <div class="label">Message Delivered</div>

      <h1>Got it, <span>loud & clear!</span></h1>

      <p class="subtitle">
        Thanks for reaching out to <strong>Esau Victor</strong>.<br>
        Your message is in — here's what happens next.
      </p>

      <div class="steps">
        <div class="step">
          <div class="step-ico green"><i class="fas fa-check"></i></div>
          Message received &amp; logged
        </div>
        <div class="step">
          <div class="step-ico"><i class="fas fa-search"></i></div>
          Reviewing your inquiry
        </div>
        <div class="step">
          <div class="step-ico"><i class="fas fa-reply"></i></div>
          Reply within 24–48 hours
        </div>
      </div>

      <a href="https://esauvictor.github.io" class="btn">
        <i class="fas fa-arrow-left"></i> Back to Portfolio
      </a>

      <div class="timer-wrap">
        <div class="timer-label">Auto-redirecting in 8s</div>
        <div class="timer-track">
          <div class="timer-fill"></div>
        </div>
      </div>

    </div>

    <footer>&copy; <span id="yr"></span> <span>Esau Victor</span>. All rights reserved.</footer>

  </div>

  <script>
    document.getElementById('yr').textContent = new Date().getFullYear();

    setTimeout(() => {
      window.location.href = 'https://esauvictor.github.io';
    }, 10400);

    // Particles
    const container = document.getElementById('particles');
    for (let i = 0; i < 20; i++) {
      const p = document.createElement('div');
      const size = 2 + Math.random() * 3;
      p.className = 'particle';
      p.style.cssText = `
        left:${Math.random()*100}%;
        top:${30+Math.random()*55}%;
        width:${size}px;height:${size}px;
        --dur:${4+Math.random()*5}s;
        --delay:${Math.random()*5}s;
      `;
      container.appendChild(p);
    }
  </script>
</body>
</html>
