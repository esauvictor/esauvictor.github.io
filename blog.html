<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Esau Victor's blog - Sharing thoughts, experiences, and insights in web development, data analytics, and cyber security" />
<meta name="keywords" content="web development blog, data analytics blog, cyber security blog, programming blog" />
<meta name="author" content="Esau Victor" />
<link rel="icon" href="https://avatars.githubusercontent.com/u/94287719?v=4" type="image/png">
<link rel="alternate" type="application/rss+xml" title="Esau Victor — Blog RSS Feed" href="https://renaissanceassembly.org/secure/api/rss.php">

<!-- Open Graph / Twitter Card — shows a real preview when this link is shared -->
<meta property="og:type" content="website">
<meta property="og:site_name" content="Esau Victor — Blog">
<meta property="og:title" content="Esau Victor — Blog">
<meta property="og:description" content="Notes on web development, data analytics &amp; cyber security.">
<meta property="og:image" content="https://avatars.githubusercontent.com/u/94287719?v=4">
<meta property="og:url" content="https://esauvictor.github.io/blog.html">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="Esau Victor — Blog">
<meta name="twitter:description" content="Notes on web development, data analytics &amp; cyber security.">
<meta name="twitter:image" content="https://avatars.githubusercontent.com/u/94287719?v=4">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<title>Esau Victor — Blog</title>
<style>
  :root{
    --ink:#12172B;
    --paper:#F3F5F8;
    --card:#FFFFFF;
    --line:#E3E7EE;
    --muted:#6B7280;
    --signal:#2F5FE0;
    --signal-dim:#EAEFFD;
    --amber:#D98A2B;
    --amber-dim:#FBF0DF;
    --radius:14px;
    --mono:'JetBrains Mono', ui-monospace, monospace;
    --display:'Space Grotesk', sans-serif;
    --body:'Inter', sans-serif;
  }
  [data-theme="dark"]{
    --ink:#E7EAF2;
    --paper:#0B0F1C;
    --card:#131A2B;
    --line:#232C42;
    --muted:#8B93A7;
    --signal:#6C8DF5;
    --signal-dim:#1B2338;
    --amber:#E8A94A;
    --amber-dim:#241C0F;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{
    margin:0;
    background:var(--paper);
    color:var(--ink);
    font-family:var(--body);
    transition:background .25s ease, color .25s ease;
  }

  /* ---------- top bar ---------- */
  .topbar{
    position:sticky;
    top:0;
    z-index:100;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0.85rem 1.5rem;
    background:var(--card);
    border-bottom:1px solid var(--line);
  }
  .brand{
    font-family:var(--mono);
    font-size:0.9rem;
    color:var(--muted);
    text-decoration:none;
    display:flex;
    align-items:center;
    gap:0.4rem;
  }
  .brand strong{color:var(--ink);}
  .brand .dot{color:var(--amber);}
  .theme-btn{
    border:1px solid var(--line);
    background:var(--paper);
    color:var(--ink);
    width:36px;
    height:36px;
    border-radius:9px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:1rem;
  }
  .theme-btn:focus-visible, a:focus-visible, button:focus-visible{
    outline:2px solid var(--signal);
    outline-offset:2px;
  }

  /* ---------- hero ---------- */
  .hero{
    max-width:920px;
    margin:0 auto;
    padding:3rem 1.5rem 1.75rem;
    text-align:left;
  }
  .prompt{
    font-family:var(--mono);
    font-size:0.85rem;
    color:var(--signal);
    margin:0 0 0.75rem;
    display:flex;
    align-items:center;
    gap:0.35rem;
  }
  .prompt .cursor{
    width:8px;
    height:1.1em;
    background:var(--signal);
    display:inline-block;
    animation:blink 1.1s steps(1) infinite;
  }
  @keyframes blink{50%{opacity:0;}}
  h1.title{
    font-family:var(--display);
    font-weight:700;
    font-size:clamp(1.9rem, 5vw, 2.75rem);
    margin:0 0 0.5rem;
    letter-spacing:-0.01em;
  }
  .subtitle{
    font-family:var(--mono);
    font-size:0.9rem;
    color:var(--muted);
    margin:0;
  }
  .subtitle::before{content:"// ";color:var(--amber);}

  /* ---------- filters ---------- */
  .filters{
    max-width:920px;
    margin:0 auto;
    padding:0 1.5rem 1.5rem;
    display:flex;
    flex-wrap:wrap;
    gap:0.5rem;
  }
  .chip{
    font-family:var(--mono);
    font-size:0.78rem;
    padding:0.4rem 0.85rem;
    border-radius:999px;
    border:1px solid var(--line);
    background:var(--card);
    color:var(--muted);
    cursor:pointer;
    white-space:nowrap;
    transition:all .15s ease;
  }
  .chip:hover{border-color:var(--signal);color:var(--ink);}
  .chip.active{
    background:var(--signal);
    border-color:var(--signal);
    color:#fff;
  }

  /* ---------- grid ---------- */
  .wrap{
    max-width:920px;
    margin:0 auto;
    padding:0 1.5rem 2rem;
  }
  .blog-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(260px, 1fr));
    gap:1.25rem;
  }
  .blog-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    overflow:hidden;
    cursor:pointer;
    display:flex;
    flex-direction:column;
    transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
  }
  .blog-card:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 24px rgba(18,23,43,0.08);
    border-color:var(--signal);
  }
  [data-theme="dark"] .blog-card:hover{
    box-shadow:0 10px 24px rgba(0,0,0,0.35);
  }
  .thumb{
    position:relative;
    aspect-ratio:16/10;
    overflow:hidden;
    background:var(--line);
  }
  .thumb img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
  }
  .tag{
    position:absolute;
    top:0.6rem;
    left:0.6rem;
    font-family:var(--mono);
    font-size:0.68rem;
    text-transform:uppercase;
    letter-spacing:0.03em;
    padding:0.25rem 0.55rem;
    border-radius:999px;
    background:var(--amber-dim);
    color:var(--amber);
    backdrop-filter:blur(4px);
  }
  .card-body{
    padding:1.1rem 1.15rem 1.25rem;
    display:flex;
    flex-direction:column;
    flex:1;
  }
  .meta{
    font-family:var(--mono);
    font-size:0.72rem;
    color:var(--muted);
    margin-bottom:0.5rem;
  }
  .meta::before{content:"> ";color:var(--signal);}
  h3.card-title{
    font-family:var(--display);
    font-size:1.15rem;
    line-height:1.3;
    margin:0 0 0.5rem;
    color:var(--ink);
  }
  .excerpt{
    font-size:0.9rem;
    line-height:1.55;
    color:var(--muted);
    margin:0 0 1rem;
    flex:1;
    display:-webkit-box;
    -webkit-line-clamp:3;
    -webkit-box-orient:vertical;
    overflow:hidden;
  }
  .read-more{
    font-family:var(--mono);
    font-size:0.8rem;
    color:var(--signal);
    text-decoration:none;
    display:inline-flex;
    align-items:center;
    gap:0.3rem;
    width:fit-content;
  }
  .read-more::after{content:"→";transition:transform .15s ease;}
  .blog-card:hover .read-more::after{transform:translateX(3px);}

  /* ---------- empty / error states ---------- */
  .state-box{
    max-width:920px;
    margin:0 auto;
    padding:2.5rem 1.5rem;
    text-align:center;
  }
  .state-box .console{
    font-family:var(--mono);
    font-size:0.85rem;
    color:var(--muted);
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:1.5rem;
    display:inline-block;
    text-align:left;
    max-width:100%;
  }
  .state-box .console .ok{color:var(--signal);}
  .state-box .console .err{color:#DC5B5B;}

  .skeleton-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(260px, 1fr));
    gap:1.25rem;
  }
  .skeleton{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:var(--radius);
    overflow:hidden;
  }
  .skeleton .thumb{background:var(--line);animation:pulse 1.4s ease-in-out infinite;}
  .skeleton .bar{height:0.7rem;background:var(--line);border-radius:4px;margin:0.9rem 1.15rem;animation:pulse 1.4s ease-in-out infinite;}
  .skeleton .bar.short{width:40%;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.5;}}

  /* ---------- pagination ---------- */
  .blog-pagination{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:0.4rem;
    margin:2.5rem 0 1rem;
    flex-wrap:wrap;
  }
  .page-btn{
    min-width:36px;
    height:36px;
    padding:0 0.6rem;
    border-radius:9px;
    border:1px solid var(--line);
    background:var(--card);
    color:var(--ink);
    font-family:var(--mono);
    font-size:0.82rem;
    cursor:pointer;
  }
  .page-btn:hover:not(:disabled){border-color:var(--signal);color:var(--signal);}
  .page-btn.active{background:var(--signal);border-color:var(--signal);color:#fff;}
  .page-btn:disabled{opacity:0.35;cursor:not-allowed;}
  .page-ellipsis{
    font-family:var(--mono);
    color:var(--muted);
    padding:0 0.25rem;
    font-size:0.82rem;
  }

  .footer-nav{
    text-align:center;
    padding:1rem 1.5rem 3rem;
  }
  .btn-home{
    font-family:var(--mono);
    font-size:0.85rem;
    color:var(--signal);
    text-decoration:none;
    border:1px solid var(--line);
    padding:0.6rem 1.3rem;
    border-radius:999px;
    display:inline-block;
    transition:all .15s ease;
  }
  .btn-home:hover{background:var(--signal-dim);border-color:var(--signal);}

  #backToTop{
    position:fixed;
    bottom:20px;
    right:20px;
    width:40px;
    height:40px;
    border-radius:50%;
    border:1px solid var(--line);
    background:var(--card);
    color:var(--ink);
    cursor:pointer;
    display:none;
    align-items:center;
    justify-content:center;
    box-shadow:0 4px 12px rgba(18,23,43,0.12);
    z-index:200;
  }

  @media (prefers-reduced-motion: reduce){
    .prompt .cursor{animation:none;}
    .skeleton .thumb, .skeleton .bar{animation:none;}
    html{scroll-behavior:auto;}
  }

  /* ---------- small phones (Galaxy S8 = 360px) ---------- */
  @media (max-width:400px){
    .topbar{padding:0.7rem 1rem;}
    .hero{padding:2rem 1rem 1.25rem;}
    h1.title{font-size:1.6rem;}
    .filters{padding:0 1rem 1.25rem;gap:0.4rem;}
    .chip{font-size:0.72rem;padding:0.35rem 0.7rem;}
    .wrap{padding:0 1rem 1.5rem;}
    .blog-grid, .skeleton-grid{grid-template-columns:1fr;gap:1rem;}
    .card-body{padding:1rem;}
    h3.card-title{font-size:1.05rem;}
    .page-btn{min-width:32px;height:32px;font-size:0.76rem;}
  }
</style>
</head>
<body>
<style>
  .site-notice {
    display:flex; align-items:center; justify-content:center; gap:1rem;
    background:var(--signal); color:#fff; font-family:var(--mono); font-size:.82rem;
    padding:.6rem 1rem; text-align:center;
  }
  .site-notice button { background:none; border:none; color:#fff; opacity:.8; cursor:pointer; font-size:.9rem; }
  .search-wrap { margin-top:1.25rem; display:flex; justify-content:center; }
  .search-input {
    width:100%; max-width:420px; padding:.7rem 1rem; border-radius:999px;
    border:1px solid var(--line); background:var(--card); color:var(--ink);
    font-family:var(--body); font-size:.9rem; outline:none;
  }
  .search-input:focus { border-color:var(--signal); }
  .post-tags { display:flex; flex-wrap:wrap; gap:.35rem; margin-top:.5rem; }
  .post-tags .ptag {
    font-size:.68rem; font-family:var(--mono); color:var(--muted);
    background:var(--signal-dim); padding:.15rem .5rem; border-radius:999px;
  }
  .view-count { font-size:.72rem; color:var(--muted); font-family:var(--mono); }
</style>

  <div id="siteNotice" class="site-notice" style="display:none;">
    <span id="siteNoticeText"></span>
    <button id="siteNoticeClose" aria-label="Dismiss">✕</button>
  </div>

  <header class="topbar">
    <a href="https://esauvictor.github.io" class="brand"><strong>esau</strong><span class="dot">.</span>victor</a>
    <div style="display:flex; align-items:center; gap:.75rem;">
      <a href="https://renaissanceassembly.org/secure/api/rss.php" class="theme-btn" aria-label="RSS feed" title="RSS feed" target="_blank" rel="noopener">📡</a>
      <button id="themeBtn" class="theme-btn" aria-label="Toggle dark mode" title="Toggle dark mode">🌙</button>
    </div>
  </header>

  <section class="hero">
    <p class="prompt">esau@devlog:~$ ls posts/<span class="cursor" aria-hidden="true"></span></p>
    <h1 class="title">The Blog</h1>
    <p class="subtitle">notes on web development, life, data analytics &amp; cyber security</p>
    <div class="search-wrap">
      <input type="search" id="searchInput" class="search-input" placeholder="Search posts...">
    </div>
  </section>

  <nav class="filters" id="filters" aria-label="Filter posts by category"></nav>

  <main class="wrap">
    <div class="skeleton-grid" id="skeletonGrid">
      <div class="skeleton"><div class="thumb"></div><div class="bar short"></div><div class="bar"></div><div class="bar" style="width:70%"></div></div>
      <div class="skeleton"><div class="thumb"></div><div class="bar short"></div><div class="bar"></div><div class="bar" style="width:70%"></div></div>
      <div class="skeleton"><div class="thumb"></div><div class="bar short"></div><div class="bar"></div><div class="bar" style="width:70%"></div></div>
    </div>

    <div class="blog-grid" id="blogGrid" style="display:none;"></div>

    <div class="state-box" id="stateBox" style="display:none;"></div>

    <div class="blog-pagination" id="pagination"></div>
  </main>

  <div class="footer-nav">
    <a href="https://esauvictor.github.io" class="btn-home">← Back to Homepage</a>
  </div>

  <button id="backToTop" aria-label="Back to top">↑</button>

  <script>
    // ---------- theme ----------
    const root = document.documentElement;
    const themeBtn = document.getElementById('themeBtn');
    const savedTheme = localStorage.getItem('blog-theme');
    if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      root.setAttribute('data-theme', 'dark');
      themeBtn.textContent = '☀️';
    }
    themeBtn.addEventListener('click', () => {
      const isDark = root.getAttribute('data-theme') === 'dark';
      if (isDark) {
        root.removeAttribute('data-theme');
        themeBtn.textContent = '🌙';
        localStorage.setItem('blog-theme', 'light');
      } else {
        root.setAttribute('data-theme', 'dark');
        themeBtn.textContent = '☀️';
        localStorage.setItem('blog-theme', 'dark');
      }
    });

    // ---------- back to top ----------
    const backToTop = document.getElementById('backToTop');
    window.addEventListener('scroll', () => {
      backToTop.style.display = window.scrollY > 300 ? 'flex' : 'none';
    });
    backToTop.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

    // ---------- data + pagination state ----------
    const API_BASE = 'https://renaissanceassembly.org/secure/api';
    const PER_PAGE = window.matchMedia('(max-width:400px)').matches ? 4 : 6;

    let allPosts = [];
    let activeCategory = 'all';
    let currentPage = 1;
    let searchQuery = '';

    const grid = document.getElementById('blogGrid');
    const skeletonGrid = document.getElementById('skeletonGrid');
    const stateBox = document.getElementById('stateBox');
    const pagination = document.getElementById('pagination');
    const filtersEl = document.getElementById('filters');
    const searchInput = document.getElementById('searchInput');

    let searchDebounce;
    searchInput.addEventListener('input', () => {
      clearTimeout(searchDebounce);
      searchDebounce = setTimeout(() => {
        searchQuery = searchInput.value.trim().toLowerCase();
        currentPage = 1;
        renderPage();
      }, 200);
    });

    function formatDate(isoString) {
      if (!isoString) return '';
      const d = new Date(isoString);
      return d.toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' });
    }

    function showState(html) {
      grid.style.display = 'none';
      pagination.innerHTML = '';
      stateBox.style.display = 'block';
      stateBox.innerHTML = html;
    }

    function getFilteredPosts() {
      let posts = allPosts;
      if (activeCategory !== 'all') {
        posts = posts.filter(p => (p.category || '').toLowerCase() === activeCategory);
      }
      if (searchQuery) {
        posts = posts.filter(p =>
          (p.title || '').toLowerCase().includes(searchQuery) ||
          (p.excerpt || '').toLowerCase().includes(searchQuery) ||
          (p.tags || []).some(t => t.toLowerCase().includes(searchQuery))
        );
      }
      return posts;
    }

    function renderFilters() {
      const categories = Array.from(new Set(allPosts.map(p => p.category).filter(Boolean)));
      if (categories.length < 2) { filtersEl.innerHTML = ''; return; }

      const chips = [{ key: 'all', label: 'All Posts' }, ...categories.map(c => ({ key: c.toLowerCase(), label: c }))];
      filtersEl.innerHTML = chips.map(c => `
        <button class="chip ${activeCategory === c.key ? 'active' : ''}" data-key="${c.key}">${c.label}</button>
      `).join('');

      filtersEl.querySelectorAll('.chip').forEach(btn => {
        btn.addEventListener('click', () => {
          activeCategory = btn.dataset.key;
          currentPage = 1;
          renderFilters();
          renderPage();
        });
      });
    }

    function renderPagination(totalPosts) {
      const totalPages = Math.max(1, Math.ceil(totalPosts / PER_PAGE));
      pagination.innerHTML = '';
      if (totalPages <= 1) return; // dynamic: no pagination needed for a single page

      const makeBtn = (label, page, opts = {}) => {
        const btn = document.createElement('button');
        btn.className = 'page-btn' + (opts.active ? ' active' : '');
        btn.textContent = label;
        btn.disabled = !!opts.disabled;
        btn.setAttribute('aria-label', opts.aria || `Page ${page}`);
        if (opts.current) btn.setAttribute('aria-current', 'page');
        btn.addEventListener('click', () => {
          currentPage = page;
          renderPage();
          document.querySelector('.hero').scrollIntoView({ behavior: 'smooth' });
        });
        return btn;
      };

      pagination.appendChild(makeBtn('‹', Math.max(1, currentPage - 1), { disabled: currentPage === 1, aria: 'Previous page' }));

      const addEllipsis = () => {
        const span = document.createElement('span');
        span.className = 'page-ellipsis';
        span.textContent = '…';
        pagination.appendChild(span);
      };

      const pages = new Set([1, totalPages, currentPage, currentPage - 1, currentPage + 1]);
      let prev = 0;
      Array.from(pages).filter(p => p >= 1 && p <= totalPages).sort((a, b) => a - b).forEach(p => {
        if (prev && p - prev > 1) addEllipsis();
        pagination.appendChild(makeBtn(String(p), p, { active: p === currentPage, current: p === currentPage }));
        prev = p;
      });

      pagination.appendChild(makeBtn('›', Math.min(totalPages, currentPage + 1), { disabled: currentPage === totalPages, aria: 'Next page' }));
    }

    function renderPage() {
      const filtered = getFilteredPosts();

      if (!filtered.length) {
        showState(`
          <div class="console">
            <div><span class="ok">$</span> query posts --category=${activeCategory}${searchQuery ? ` --search="${searchQuery}"` : ''}</div>
            <div style="margin-top:0.5rem;">No posts found${searchQuery ? ' matching your search' : ' in this category yet'}.</div>
          </div>
        `);
        return;
      }

      const totalPages = Math.max(1, Math.ceil(filtered.length / PER_PAGE));
      if (currentPage > totalPages) currentPage = totalPages;

      const start = (currentPage - 1) * PER_PAGE;
      const pagePosts = filtered.slice(start, start + PER_PAGE);

      stateBox.style.display = 'none';
      grid.style.display = 'grid';
      grid.innerHTML = pagePosts.map(p => `
        <article class="blog-card" onclick="window.location.href='post.html?slug=${encodeURIComponent(p.slug)}'">
          <div class="thumb">
            <img src="${p.cover_image_url || 'https://github.com/esauvictor/esauvictor.github.io/raw/main/Esau%20De%20Genius.jpg'}" alt="${p.title}" loading="lazy" />
            ${p.category ? `<span class="tag">${p.category}</span>` : ''}
          </div>
          <div class="card-body">
            <div class="meta">${formatDate(p.published_at)}${p.view_count ? ` · <span class="view-count">${p.view_count} views</span>` : ''}</div>
            <h3 class="card-title">${p.title}</h3>
            <p class="excerpt">${p.excerpt || ''}</p>
            ${(p.tags && p.tags.length) ? `<div class="post-tags">${p.tags.map(t => `<span class="ptag">#${t}</span>`).join('')}</div>` : ''}
            <a href="post.html?slug=${encodeURIComponent(p.slug)}" class="read-more" onclick="event.stopPropagation()">Read more</a>
          </div>
        </article>
      `).join('');

      renderPagination(filtered.length);
    }

    // ---------- site notice banner ----------
    (function () {
      const bar = document.getElementById('siteNotice');
      const text = document.getElementById('siteNoticeText');
      const closeBtn = document.getElementById('siteNoticeClose');
      if (sessionStorage.getItem('noticeDismissed') === '1') return;
      fetch(`${API_BASE}/notice.php`)
        .then(res => res.json())
        .then(data => {
          if (data.notice && data.notice.message) {
            text.textContent = data.notice.message;
            bar.style.display = 'flex';
          }
        })
        .catch(() => {});
      closeBtn.addEventListener('click', () => {
        bar.style.display = 'none';
        sessionStorage.setItem('noticeDismissed', '1');
      });
    })();

    fetch(`${API_BASE}/posts.php`)
      .then(res => res.json())
      .then(data => {
        skeletonGrid.style.display = 'none';
        allPosts = (data.posts || []).slice().sort((a, b) => new Date(b.published_at) - new Date(a.published_at));

        if (!allPosts.length) {
          showState(`
            <div class="console">
              <div><span class="ok">$</span> query posts --all</div>
              <div style="margin-top:0.5rem;">No posts yet — check back soon.</div>
            </div>
          `);
          return;
        }

        renderFilters();
        renderPage();
      })
      .catch(() => {
        skeletonGrid.style.display = 'none';
        showState(`
          <div class="console">
            <div><span class="err">$</span> query posts --all</div>
            <div style="margin-top:0.5rem;">Couldn't load posts right now — please try again later.</div>
          </div>
        `);
      });
  </script>
</body>
</html>
